<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code Generator Pro | โทนช็อกโกแลต (Firebase)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- QR Code Styling Library -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#5D4037', // Brown 700
                        secondary: '#795548', // Brown 500
                        choco: {
                            50: '#EFEBE9',
                            100: '#D7CCC8',
                            200: '#BCAAA4',
                            500: '#795548',
                            600: '#6D4C41',
                            700: '#5D4037',
                            800: '#4E342E',
                            900: '#3E2723',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FAFC; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D7CCC8; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #BCAAA4; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .color-btn { transition: transform 0.2s; }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { ring: 2px; ring-offset: 2px; ring-color: #5D4037; border-color: transparent !important; transform: scale(1.1); }
        .tab-btn.active { background-color: #5D4037; color: white; border-color: #5D4037; box-shadow: 0 4px 6px -1px rgba(93, 64, 55, 0.2); }
        .tab-btn { background-color: #f3f4f6; color: #4b5563; border: 1px solid transparent; }
        .tab-btn:hover:not(.active) { background-color: #EFEBE9; color: #5D4037; }
        
        #qr-canvas-container canvas {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #3E2723;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 16px;
            position: fixed;
            z-index: 9999;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s, visibility 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 60px; }

        /* Modal Transitions */
        .modal-enter { opacity: 0; pointer-events: none; }
        .modal-enter-active { opacity: 1; pointer-events: auto; transition: opacity 0.3s ease; }
    </style>
</head>
<body class="text-gray-800 flex flex-col h-screen overflow-hidden">

    <!-- Navbar -->
    <nav class="shrink-0 bg-white border-b border-gray-200 px-4 md:px-6 py-3 flex items-center justify-between shadow-sm relative z-20">
        <div class="flex items-center">
            <svg class="w-6 h-6 mr-3 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            <h1 class="text-lg md:text-xl font-bold text-gray-800">QR Generator Pro</h1>
        </div>
        
        <!-- Auth Area -->
        <div id="auth-container" class="flex items-center gap-3">
            <button id="btn-login" class="bg-choco-50 text-primary border border-choco-200 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-choco-100 transition disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg>
                เข้าสู่ระบบ
            </button>
            <div id="user-menu" class="hidden items-center gap-2">
                <button onclick="openHistoryModal()" class="text-sm font-medium text-choco-700 bg-choco-50 px-3 py-1.5 rounded-lg hover:bg-choco-100 transition flex items-center gap-1 border border-choco-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ประวัติของฉัน
                </button>
                <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border border-gray-200">
                <button id="btn-logout" class="text-xs text-gray-500 hover:text-red-500 underline ml-1">ออกระบบ</button>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="flex-1 min-h-0 flex flex-col">
        <div class="max-w-7xl w-full mx-auto px-4 py-4 md:py-6 flex-1 flex flex-col min-h-0">
            <!-- Split Container -->
            <div class="flex flex-col lg:flex-row gap-6 flex-1 min-h-0 overflow-y-auto lg:overflow-hidden custom-scrollbar pb-6 lg:pb-0">
                
                <!-- Left Column: Controls -->
                <div class="flex-[1.5] flex flex-col gap-5 md:gap-6 lg:overflow-y-auto custom-scrollbar lg:pr-3">
                    
                    <!-- Step 1: Data Input -->
                    <div class="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-gray-100 shrink-0">
                        <div class="flex items-center gap-3 mb-4 md:mb-5">
                            <div class="bg-primary text-white w-6 h-6 md:w-7 md:h-7 rounded-full flex items-center justify-center text-xs md:text-sm font-bold">1</div>
                            <h3 class="text-base md:text-lg font-bold">เลือกประเภทข้อมูล</h3>
                        </div>

                        <!-- Horizontal Scrollable Tabs -->
                        <div class="flex overflow-x-auto hide-scrollbar gap-2 mb-5 pb-2 -mx-1 px-1">
                            <button onclick="switchTab('url')" id="tab-url" class="tab-btn active shrink-0 flex items-center justify-center gap-2 py-2 px-4 md:py-2.5 rounded-xl font-medium transition-all text-sm">
                                ลิงก์ URL
                            </button>
                            <button onclick="switchTab('promptpay')" id="tab-promptpay" class="tab-btn shrink-0 flex items-center justify-center gap-2 py-2 px-4 md:py-2.5 rounded-xl font-medium transition-all text-sm">
                                PromptPay
                            </button>
                            <button onclick="switchTab('text')" id="tab-text" class="tab-btn shrink-0 flex items-center justify-center gap-2 py-2 px-4 md:py-2.5 rounded-xl font-medium transition-all text-sm">
                                ข้อความ
                            </button>
                            <button onclick="switchTab('wifi')" id="tab-wifi" class="tab-btn shrink-0 flex items-center justify-center gap-2 py-2 px-4 md:py-2.5 rounded-xl font-medium transition-all text-sm">
                                WiFi
                            </button>
                            <button onclick="switchTab('phone')" id="tab-phone" class="tab-btn shrink-0 flex items-center justify-center gap-2 py-2 px-4 md:py-2.5 rounded-xl font-medium transition-all text-sm">
                                โทรศัพท์
                            </button>
                            <button onclick="switchTab('email')" id="tab-email" class="tab-btn shrink-0 flex items-center justify-center gap-2 py-2 px-4 md:py-2.5 rounded-xl font-medium transition-all text-sm">
                                อีเมล
                            </button>
                        </div>

                        <!-- Input Forms -->
                        <div id="form-container">
                            <div id="form-url" class="space-y-3">
                                <label class="block text-sm font-medium text-gray-700">ลิงก์ต้นฉบับ (URL ยาว)</label>
                                <div class="flex flex-col sm:flex-row gap-2">
                                    <input type="url" id="inp-url" oninput="updateQR()" class="flex-1 px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="https://www.example.com">
                                    <button onclick="shortenUrl()" id="btn-shorten" class="bg-choco-50 text-primary px-4 py-2.5 rounded-xl flex items-center justify-center gap-2 hover:bg-choco-100 transition-colors font-medium border border-choco-100 whitespace-nowrap">
                                        ย่อลิงก์
                                    </button>
                                </div>
                                <p id="short-url-result" class="text-sm text-green-600 hidden font-medium flex items-center gap-1 mt-2">
                                    ลิงก์ที่ย่อแล้ว: <a href="#" target="_blank" id="short-url-link" class="underline break-all"></a>
                                </p>
                            </div>

                            <div id="form-promptpay" class="space-y-4 hidden">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์ หรือ รหัสบัตรประชาชน</label>
                                    <input type="text" id="inp-pp-id" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="0812345678" maxlength="13">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">จำนวนเงิน (เว้นว่างได้ถ้าไม่ระบุ)</label>
                                    <input type="number" id="inp-pp-amount" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="0.00">
                                </div>
                            </div>

                            <div id="form-text" class="hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">ข้อความของคุณ</label>
                                <textarea id="inp-text" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none h-24" placeholder="พิมพ์ข้อความที่ต้องการ..."></textarea>
                            </div>

                            <div id="form-wifi" class="grid grid-cols-1 sm:grid-cols-2 gap-4 hidden">
                                <div class="sm:col-span-2">
                                    <label class="block text-sm font-medium text-gray-700 mb-1">SSID (ชื่อเครือข่าย WiFi)</label>
                                    <input type="text" id="inp-wifi-ssid" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="My WiFi Network">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                                    <input type="password" id="inp-wifi-pass" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="********">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">ระบบป้องกัน</label>
                                    <select id="inp-wifi-enc" onchange="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none bg-white">
                                        <option value="WPA">WPA/WPA2</option>
                                        <option value="WEP">WEP</option>
                                        <option value="nopass">ไม่มีรหัสผ่าน</option>
                                    </select>
                                </div>
                            </div>

                            <div id="form-phone" class="hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                                <input type="tel" id="inp-phone" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="0812345678">
                            </div>

                            <div id="form-email" class="space-y-4 hidden">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">อีเมลผู้รับ</label>
                                    <input type="email" id="inp-email-to" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="example@mail.com">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">หัวข้อ</label>
                                    <input type="text" id="inp-email-sub" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="ระบุหัวข้อ...">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียดข้อความ</label>
                                    <textarea id="inp-email-body" oninput="updateQR()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none h-20" placeholder="พิมพ์ข้อความ..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: Design Customization -->
                    <div class="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-gray-100 shrink-0">
                        <div class="flex items-center gap-3 mb-4 md:mb-5">
                            <div class="bg-primary text-white w-6 h-6 md:w-7 md:h-7 rounded-full flex items-center justify-center text-xs md:text-sm font-bold">2</div>
                            <h3 class="text-base md:text-lg font-bold">ปรับแต่งดีไซน์</h3>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">สีคิวอาร์โค้ด</label>
                                <div class="flex flex-wrap gap-2 items-center" id="dots-colors">
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300 active" style="background-color: #000000" onclick="setDotsColor('#000000', this)"></button>
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300" style="background-color: #5D4037" onclick="setDotsColor('#5D4037', this)"></button>
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300" style="background-color: #8D6E63" onclick="setDotsColor('#8D6E63', this)"></button>
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300" style="background-color: #10B981" onclick="setDotsColor('#10B981', this)"></button>
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300" style="background-color: #1E3A8A" onclick="setDotsColor('#1E3A8A', this)"></button>
                                    <div class="relative w-8 h-8 rounded-full overflow-hidden border border-gray-300 shadow-sm cursor-pointer ml-1" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);">
                                        <input type="color" id="inp-color-dots" oninput="setDotsColor(this.value, null)" onchange="setDotsColor(this.value, null)" class="absolute -top-2 -left-2 w-12 h-12 opacity-0 cursor-pointer">
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">สีพื้นหลัง</label>
                                <div class="flex flex-wrap gap-2 items-center" id="bg-colors">
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300 active" style="background-color: #ffffff" onclick="setBgColor('#ffffff', this)"></button>
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300" style="background-color: #F5F5F5" onclick="setBgColor('#F5F5F5', this)"></button>
                                    <button class="color-btn w-8 h-8 rounded-full border border-gray-300" style="background-color: #EFEBE9" onclick="setBgColor('#EFEBE9', this)"></button>
                                    <div class="relative w-8 h-8 rounded-full overflow-hidden border border-gray-300 shadow-sm cursor-pointer ml-1" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);">
                                        <input type="color" id="inp-color-bg" value="#ffffff" oninput="setBgColor(this.value, null)" onchange="setBgColor(this.value, null)" class="absolute -top-2 -left-2 w-12 h-12 opacity-0 cursor-pointer">
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">รูปแบบจุด (Pattern)</label>
                                <select id="inp-pattern" onchange="updateQR()" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none bg-white">
                                    <option value="square">สี่เหลี่ยมปกติ (Square)</option>
                                    <option value="dots">จุดกลม (Dots)</option>
                                    <option value="rounded">ขอบมน (Rounded)</option>
                                    <option value="extra-rounded">ขอบมนมาก (Extra Rounded)</option>
                                    <option value="classy">คลาสสิก (Classy)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">แทรกโลโก้</label>
                                <div class="relative">
                                    <input type="file" id="inp-logo" accept="image/*" onchange="handleLogoUpload(event)" class="hidden">
                                    <button onclick="document.getElementById('inp-logo').click()" class="bg-gray-50 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-100 transition-colors w-full">
                                        เลือกรูปภาพ
                                    </button>
                                    <button id="btn-remove-logo" onclick="removeLogo()" class="hidden absolute right-0 top-0 mt-2 mr-2 bg-white text-red-500 rounded-full hover:text-red-700 text-xs shadow-sm px-2 py-1 border border-red-100">ลบโลโก้</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Preview & Actions -->
                <div class="flex-1 w-full lg:max-w-md mx-auto lg:overflow-y-auto custom-scrollbar lg:pl-2 pb-4 lg:pb-0">
                    <div class="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-gray-100">
                        <h3 class="text-center font-bold text-gray-800 mb-3 md:mb-4 text-base md:text-lg">ตัวอย่าง Real-time</h3>
                        
                        <div class="bg-choco-50 rounded-xl p-4 flex items-center justify-center min-h-[250px] md:min-h-[300px] border border-choco-100 mb-5 relative overflow-hidden">
                            <div id="qr-canvas-container" class="bg-white shadow-sm p-2 rounded-lg"></div>
                        </div>

                        <div class="space-y-3">
                            <button onclick="shareQR()" class="w-full bg-primary text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-choco-800 transition-colors shadow-md text-sm md:text-base">
                                แชร์ (Share)
                            </button>

                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="copyImage()" class="bg-choco-50 text-primary py-2 px-1 rounded-xl text-xs md:text-sm font-medium flex flex-col items-center justify-center gap-1 hover:bg-choco-100 transition border border-choco-100">
                                    คัดลอกรูป
                                </button>
                                <button onclick="downloadPNG()" class="bg-gray-800 text-white py-2 px-1 rounded-xl text-xs md:text-sm font-medium flex flex-col items-center justify-center gap-1 hover:bg-gray-900 transition shadow-sm">
                                    โหลด PNG
                                </button>
                                <button onclick="copyLink()" class="bg-choco-50 text-primary py-2 px-1 rounded-xl text-xs md:text-sm font-medium flex flex-col items-center justify-center gap-1 hover:bg-choco-100 transition border border-choco-100">
                                    คัดลอกลิงก์
                                </button>
                            </div>

                            <button id="btn-save-db" class="w-full mt-2 bg-emerald-50 text-emerald-700 border border-emerald-200 py-2.5 md:py-3 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-emerald-100 transition-colors text-sm md:text-base">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                                บันทึกลงฐานข้อมูล
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Minimal Footer -->
    <footer class="shrink-0 bg-white border-t border-gray-200 py-3 relative z-20">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs md:text-sm text-gray-400">
            &copy; 2026 QR Generator Pro. All rights reserved. <span class="hidden sm:inline">|</span> <br class="sm:hidden" /> <span class="text-choco-500">Thaigham School Development</span>
        </div>
    </footer>

    <!-- History Modal -->
    <div id="history-modal" class="fixed inset-0 bg-black/60 z-50 modal-enter flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-choco-50">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ประวัติคิวอาร์โค้ดของฉัน
                </h2>
                <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-gray-700 bg-white rounded-full p-1 shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- History Content -->
            <div class="p-6 overflow-y-auto flex-1 bg-gray-50 custom-scrollbar relative">
                <div id="history-loading" class="absolute inset-0 bg-gray-50/80 flex items-center justify-center hidden z-10">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                </div>
                
                <div id="history-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Cards will be injected here -->
                </div>
                
                <div id="history-empty" class="hidden text-center py-10 text-gray-500">

    <!-- Firebase and Main Logic Script -->

            messagingSenderId: "753672108518",

        // ระบบช่วยป้องกัน Error และใช้ค่า Config จาก Canvas ถ้ามี
        try {

                const parsedConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;

        btnLogin.addEventListener('click', async () => {
            if (firebaseConfig.apiKey === "YOUR_API_KEY" || firebaseConfig.apiKey === "dummy-key") {

            // ป้องกันการกดปุ่มซ้ำ (Double Click) ซึ่งทำให้เกิด error: cancelled-popup-request

            btnLogin.innerHTML = '<svg class="animate-spin w-4 h-4 text-primary mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังโหลด...';

                if (error.code === 'auth/cancelled-popup-request') {
                    window.showToast("การเข้าสู่ระบบถูกยกเลิก (ปิดหน้าต่างไปก่อน)");

                    window.showToast("เกิดข้อผิดพลาด: " + error.message);

        btnLogout.addEventListener('click', () => {
            signOut(auth);
            window.showToast("ออกจากระบบแล้ว");

        });

        // ==========================================
        // 3. Database Operations (Save & Load)
        // ==========================================
        document.getElementById('btn-save-db').addEventListener('click', async () => {
            if (!auth.currentUser) {
                window.showToast("กรุณาเข้าสู่ระบบก่อนบันทึกข้อมูล");
                return;
            }

            const payload = window.getPayload();
            if (!payload || payload.trim() === '') {
                return window.showToast("ไม่มีข้อมูลสำหรับบันทึก");

            } catch (err) {
                console.error(err);
                window.showToast("เกิดข้อผิดพลาดในการบันทึก");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        window.fetchAndRenderHistory = async () => {
            if (!auth.currentUser) return;
            const grid = document.getElementById('history-grid');
            const emptyState = document.getElementById('history-empty');
            const loader = document.getElementById('history-loading');
            
            loader.classList.remove('hidden');
            
            try {
                const q = collection(db, getCollectionPath());
                const querySnapshot = await getDocs(q);
                
                historyCache = [];
                querySnapshot.forEach((doc) => {
                    historyCache.push({ id: doc.id, ...doc.data() });
                });

                historyCache.sort((a, b) => b.createdAt - a.createdAt);

                grid.innerHTML = '';
                if (historyCache.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    
                    historyCache.forEach(item => {
                        let typeLabels = { 'url': 'ลิงก์ URL', 'promptpay': 'PromptPay', 'text': 'ข้อความ', 'wifi': 'WiFi', 'phone': 'โทรศัพท์', 'email': 'อีเมล' };
                        let dateStr = new Date(item.createdAt).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
                        
                        let snippet = item.payload;
                        if(snippet.length > 50) snippet = snippet.substring(0, 50) + '...';

                        const card = document.createElement('div');
                        card.className = "bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition flex flex-col justify-between";
                        card.innerHTML = `
                            <div>
                                <div class="flex justify-between items-start mb-2">
                                    <span class="bg-choco-100 text-primary text-xs font-bold px-2 py-1 rounded">${typeLabels[item.type] || 'Unknown'}</span>
                                    <span class="text-xs text-gray-400">${dateStr}</span>
                                </div>
                                <p class="text-sm text-gray-600 mb-4 break-all line-clamp-2">${snippet}</p>
                            </div>
                            <div class="flex gap-2 mt-auto">
                                <button onclick="recreateFromHistory('${item.id}')" class="flex-1 bg-choco-50 text-primary text-xs font-medium py-2 rounded-lg hover:bg-choco-100 border border-choco-100">
                                    ดึงข้อมูลมาสร้างใหม่
                                </button>
                                <button onclick="deleteHistoryItem('${item.id}')" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg" title="ลบ">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (e) {
                console.error(e);
                window.showToast("โหลดประวัติไม่สำเร็จ");
            } finally {
                loader.classList.add('hidden');
            }
        };

        window.deleteHistoryItem = async (id) => {
            if(!confirm("คุณต้องการลบประวัตินี้ใช่หรือไม่?")) return;
            try {
                await deleteDoc(doc(db, getCollectionPath(), id));
                window.showToast("ลบข้อมูลแล้ว");
                window.fetchAndRenderHistory();
            } catch(e) {
                window.showToast("ลบไม่สำเร็จ");
            }
        };

        window.recreateFromHistory = (id) => {
            const item = historyCache.find(h => h.id === id);
            if(!item) return;

            if(item.data) {
                if(item.data.url) document.getElementById('inp-url').value = item.data.url;
                window.shortenedUrl = item.data.shortUrl || '';
                if(item.data.promptpayId) document.getElementById('inp-pp-id').value = item.data.promptpayId;
                if(item.data.promptpayAmount) document.getElementById('inp-pp-amount').value = item.data.promptpayAmount;
                if(item.data.text) document.getElementById('inp-text').value = item.data.text;
                if(item.data.wifiSsid) document.getElementById('inp-wifi-ssid').value = item.data.wifiSsid;
                if(item.data.wifiPass) document.getElementById('inp-wifi-pass').value = item.data.wifiPass;
                if(item.data.wifiEnc) document.getElementById('inp-wifi-enc').value = item.data.wifiEnc;
                if(item.data.phone) document.getElementById('inp-phone').value = item.data.phone;

        window.openHistoryModal = () => {

            modal.classList.add('modal-enter-active');

        };

    </script>

    <!-- UI Interactions Script -->
    <script>
        window.currentTab = 'url';
        window.shortenedUrl = '';
        window.currentLogoUrl = null;
        window.qrCodeInstance = null;
        window.designState = {
            dotsColor: '#000000',
            bgColor: '#ffffff',
            pattern: 'square'
        };

        function closeHistoryModal() {
            document.getElementById('history-modal').classList.remove('modal-enter-active');
        }

        function crc16(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                crc ^= data.charCodeAt(i) << 8;
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x8000) > 0) crc = (crc << 1) ^ 0x1021;
                    else crc = crc << 1;
                }
            }
            return crc.toString(16).toUpperCase().padStart(4, '0');
        }

        window.generatePromptPayPayload = function(id, amount) {
            let target = id.replace(/[^0-9]/g, '');
            if(!target) return ' ';
            let idType = target.length >= 13 ? '02' : '01';
            
            if (idType === '01') {
                target = target.length === 10 ? '0066' + target.substring(1) : target;
            }

            const targetLen = target.length.toString().padStart(2, '0');
            const merchantInfo = `0016A000000677010111${idType}${targetLen}${target}`;
            const merchantInfoLen = merchantInfo.length.toString().padStart(2, '0');
            
            let payload = `00020101021129${merchantInfoLen}${merchantInfo}5802TH5303764`;
            
            if (amount && amount > 0) {
                const amountStr = parseFloat(amount).toFixed(2);
                const amountLen = amountStr.length.toString().padStart(2, '0');
                payload += `54${amountLen}${amountStr}`;
            }
            payload += `6304`;
            return payload + crc16(payload);
        }

        function initQR() {
            window.qrCodeInstance = new QRCodeStyling({
                width: 250,
                height: 250,
                data: "https://www.example.com",
                margin: 5,
                qrOptions: { typeNumber: 0, mode: "Byte", errorCorrectionLevel: "Q" },
                imageOptions: { hideBackgroundDots: true, imageSize: 0.4, margin: 5 },
                dotsOptions: { type: window.designState.pattern, color: window.designState.dotsColor },
                backgroundOptions: { color: window.designState.bgColor }
            });
            window.qrCodeInstance.append(document.getElementById("qr-canvas-container"));
            updateQR();
        }

        window.getPayload = function() {
            switch(window.currentTab) {
                case 'url':
                    const rawUrl = document.getElementById('inp-url').value;
                    return window.shortenedUrl || rawUrl || ' ';
                case 'promptpay':
                    return window.generatePromptPayPayload(document.getElementById('inp-pp-id').value, document.getElementById('inp-pp-amount').value) || ' ';
                case 'text':
                    return document.getElementById('inp-text').value || ' ';
                case 'wifi':
                    const ssid = document.getElementById('inp-wifi-ssid').value;
                    const pass = document.getElementById('inp-wifi-pass').value;
                    const enc = document.getElementById('inp-wifi-enc').value;
                    if(!ssid) return ' ';
                    const escape = (str) => str.replace(/([\\;:])/g, "\\$1");
                    return `WIFI:T:${enc};S:${escape(ssid)};P:${escape(pass)};;`;
                case 'phone':
                    const phone = document.getElementById('inp-phone').value;
                    return phone ? `tel:${phone}` : ' ';
                case 'email':
                    const to = document.getElementById('inp-email-to').value;
                    const sub = document.getElementById('inp-email-sub').value;
                    const body = document.getElementById('inp-email-body').value;
                    if(!to) return ' ';
                    return `mailto:${to}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
                default: return ' ';
            }
        }

        function updateQR() {
            if(!window.qrCodeInstance) return;
            const payload = window.getPayload();
            window.designState.pattern = document.getElementById('inp-pattern').value;

            window.qrCodeInstance.update({
                data: payload,
                dotsOptions: { color: window.designState.dotsColor, type: window.designState.pattern },
                backgroundOptions: { color: window.designState.bgColor },
                image: window.currentLogoUrl
            });
        }

        async function shortenUrl() {
            const urlInput = document.getElementById('inp-url').value;
            if(!urlInput) return window.showToast("กรุณากรอก URL ก่อนย่อลิงก์");
            
            const btn = document.getElementById('btn-shorten');
            btn.innerHTML = 'กำลังย่อ...';
            btn.disabled = true;

            try {
                const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(urlInput)}`);
                const data = await res.json();
                if(data.shorturl) {
                    window.shortenedUrl = data.shorturl;
                    const resContainer = document.getElementById('short-url-result');
                    const linkEl = document.getElementById('short-url-link');
                    linkEl.href = window.shortenedUrl;
                    linkEl.textContent = window.shortenedUrl;
                    resContainer.classList.remove('hidden');
                    window.showToast("ย่อลิงก์สำเร็จ!");
                    updateQR();
                } else {
                    window.showToast("ไม่สามารถย่อลิงก์ได้");
                }
            } catch(e) {
                window.showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ is.gd");
            } finally {
                btn.innerHTML = 'ย่อลิงก์';
                btn.disabled = false;
            }
        }

        window.switchTab = function(tabId) {
            window.currentTab = tabId;
            window.shortenedUrl = '';
            document.getElementById('short-url-result').classList.add('hidden');

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${tabId}`);
            activeTab.classList.add('active');
            activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            const forms = ['url', 'promptpay', 'text', 'wifi', 'phone', 'email'];
            forms.forEach(f => document.getElementById(`form-${f}`).classList.add('hidden'));
            document.getElementById(`form-${tabId}`).classList.remove('hidden');

            updateQR();
        }

        function setDotsColor(color, btnEl) {
            window.designState.dotsColor = color;
            document.querySelectorAll('#dots-colors .color-btn').forEach(b => b.classList.remove('active'));
            if(btnEl) btnEl.classList.add('active');
            updateQR();
        }

        function setBgColor(color, btnEl) {
            window.designState.bgColor = color;
            document.querySelectorAll('#bg-colors .color-btn').forEach(b => b.classList.remove('active'));
            if(btnEl) btnEl.classList.add('active');
            updateQR();
        }

        function handleLogoUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                window.currentLogoUrl = event.target.result;
                document.getElementById('btn-remove-logo').classList.remove('hidden');
                updateQR();
            };
            reader.readAsDataURL(file);
        }

        function removeLogo() {
            window.currentLogoUrl = null;
            document.getElementById('inp-logo').value = '';
            document.getElementById('btn-remove-logo').classList.add('hidden');
            updateQR();
        }

        function downloadPNG() {
            if(window.qrCodeInstance) {
                window.qrCodeInstance.download({ name: "qrcode_pro", extension: "png" });
                window.showToast("ดาวน์โหลดสำเร็จ!");
            }
        }

        async function copyImage() {
            const canvas = document.querySelector('#qr-canvas-container canvas');
            if(!canvas) return;
            try {
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                        window.showToast("คัดลอกรูปภาพแล้ว");
                    } catch(err) { window.showToast("เบราว์เซอร์ของคุณไม่รองรับการคัดลอกรูปภาพ"); }
                });
            } catch(e) { window.showToast("เกิดข้อผิดพลาด"); }
        }

        function copyLink() {
            const data = window.getPayload();
            if(data && data.trim() !== '') {
                const el = document.createElement('textarea');
                el.value = data; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                window.showToast("คัดลอกข้อมูล/ลิงก์แล้ว");
            } else { window.showToast("ไม่มีข้อมูลให้คัดลอก"); }
        }

        async function shareQR() {
            const canvas = document.querySelector('#qr-canvas-container canvas');
            if (navigator.share && canvas) {
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.share({ title: 'แชร์ QR Code', files: [new File([blob], "qrcode.png", { type: "image/png" })] });
                    } catch(e) {
                        const data = window.getPayload();
                        if(data.length < 200) navigator.share({ title: 'QR Data', text: data }).catch(e=>{});
                    }
                });
            } else { window.showToast("อุปกรณ์นี้ไม่รองรับการแชร์โดยตรง"); }
        }

        let toastTimeout;
        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("show");
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        // Run Init
        window.addEventListener('load', initQR);
    </script>
</body>
